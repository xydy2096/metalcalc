<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Operario v2 - Gestión de Errores</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --light: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
        
        header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; position: sticky; top: 0; z-index: 10; }
        #reloj { font-size: 1.4rem; font-weight: bold; color: var(--primary); }

        .lista-materiales { display: flex; flex-direction: column; gap: 12px; padding-bottom: 100px; }
        .item { background: white; padding: 18px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #bdc3c7; transition: 0.3s; }
        .item.cortando { border-left-color: var(--warning); background: #fffdf0; }
        .item.cortado { border-left-color: var(--success); background: #fafffa; opacity: 0.7; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.9rem; text-transform: uppercase; }
        .btn-iniciar { background: var(--primary); color: white; }
        .btn-check { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }

        /* Botón Flotante */
        #btn-error-flotante { position: fixed; bottom: 25px; right: 25px; width: 70px; height: 70px; border-radius: 50%; background: var(--danger); color: white; border: none; font-size: 1.8rem; box-shadow: 0 6px 12px rgba(231, 76, 60, 0.4); cursor: pointer; z-index: 100; }

        /* Modal y Pasos */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; }
        .step { display: none; }
        .step.active { display: block; }
        
        select, input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<header>
    <div><small>ORDEN DE TRABAJO</small><br><strong>#2026-001 NAVE INDUSTRIAL</strong></div>
    <div id="reloj">00:00:00</div>
</header>

<div class="lista-materiales" id="lista"></div>

<button id="btn-error-flotante" onclick="abrirModal()">⚠️</button>

<div id="modal-error" class="modal">
    <div class="modal-content">
        <div id="step1" class="step active">
            <h3 style="color:var(--danger)">¿Qué ha pasado?</h3>
            <label>Material con error:</label>
            <select id="select-material-error"></select>
            
            <p>¿A dónde enviamos el trozo fallido?</p>
            <div class="grid-btns">
                <button class="btn btn-warning" onclick="irAPaso2('RETALES')">📥 RETALES</button>
                <button class="btn" style="background:#95a5a6; color:white;" onclick="irAPaso2('CHATARRA')">🗑️ CHATARRA</button>
            </div>
            <button onclick="cerrarModal()" style="background:none; border:none; color:grey; margin-top:20px; width:100%; cursor:pointer;">Cancelar</button>
        </div>

        <div id="step2" class="step">
            <h3>Corrección de Error</h3>
            <div id="zona-ubicacion" style="display:none;">
                <p>Indica la ubicación del retal:</p>
                <select id="ubicacion-retal">
                    <option>Cantilever Principal</option>
                    <option>Estantería A (Sobrantes)</option>
                    <option>Palet Suelo</option>
                </select>
            </div>
            
            <p><strong>¿Cómo reponemos la pieza faltante?</strong></p>
            <div class="grid-btns">
                <button class="btn btn-iniciar" onclick="finalizarError('NUEVA')">🆕 BARRA NUEVA</button>
                <button class="btn btn-check" onclick="finalizarError('RETAL')">♻️ USAR RETAL</button>
            </div>
        </div>
    </div>
</div>

<script>
    let materiales = [
        { id: 1, nombre: "Tubo 40x40x1.5", cant: 4, largo: "1500mm", estado: "pendiente" },
        { id: 2, nombre: "IPN 120", cant: 2, largo: "3200mm", estado: "pendiente" },
        { id: 3, nombre: "Redondo 16mm", cant: 10, largo: "500mm", estado: "pendiente" }
    ];

    let idMaterialError = null;
    let destinoSobrante = '';

    function renderizar() {
        const lista = document.getElementById('lista');
        const select = document.getElementById('select-material-error');
        lista.innerHTML = "";
        select.innerHTML = "";

        materiales.forEach(m => {
            const div = document.createElement('div');
            div.className = `item ${m.estado}`;
            div.innerHTML = `
                <div class="info">
                    <strong>${m.nombre}</strong><br>
                    <small>${m.cant} uds. de ${m.largo}</small>
                </div>
                <div>
                    ${m.estado === 'pendiente' ? `<button class="btn btn-iniciar" onclick="cambiarEstado(${m.id}, 'cortando')">Iniciar</button>` : ''}
                    ${m.estado === 'cortando' ? `<button class="btn btn-warning" onclick="cambiarEstado(${m.id}, 'cortado')">Hecho ✅</button>` : ''}
                </div>
            `;
            lista.appendChild(div);

            const opt = document.createElement('option');
            opt.value = m.id;
            opt.textContent = m.nombre;
            if (m.estado === 'cortando') opt.selected = true;
            select.appendChild(opt);
        });

        if (materiales.every(m => m.estado === 'cortado')) alert("¡Corte finalizado!");
    }

    function cambiarEstado(id, nuevo) {
        materiales.find(m => m.id === id).estado = nuevo;
        renderizar();
    }

    function abrirModal() {
        document.getElementById('modal-error').style.display = 'flex';
        document.getElementById('step1').classList.add('active');
        document.getElementById('step2').classList.remove('active');
    }

    function irAPaso2(destino) {
        destinoSobrante = destino;
        idMaterialError = parseInt(document.getElementById('select-material-error').value);
        
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        
        // Si es para retales, mostramos el selector de ubicación
        document.getElementById('zona-ubicacion').style.display = (destino === 'RETALES') ? 'block' : 'none';
    }

    function finalizarError(metodoReposicion) {
        const mat = materiales.find(m => m.id === idMaterialError);
        
        // Lógica de recuperación: El material vuelve a estar pendiente para ser cortado de nuevo
        mat.estado = 'pendiente';
        
        alert(`Error registrado:
        - Sobrante enviado a: ${destinoSobrante}
        - Reposición mediante: ${metodoReposicion}
        - La pieza ha sido re-añadida a la lista.`);
        
        cerrarModal();
        renderizar();
    }

    function cerrarModal() { document.getElementById('modal-error').style.display = 'none'; }
    setInterval(() => { document.getElementById('reloj').textContent = new Date().toLocaleTimeString(); }, 1000);
    renderizar();
</script>

</body>
</html>
