<script>
    // ... (Mantén tu firebaseConfig igual) ...

    // CAMBIO: Ahora filtramos para que NO salgan los 'cortado'
    db.collection("materiales")
      .where("estado", "!=", "cortado") // <--- Solo lo que falta por hacer
      .onSnapshot((snapshot) => {
        const lista = document.getElementById('lista');
        lista.innerHTML = "";

        if (snapshot.empty) {
            lista.innerHTML = "<div style='text-align:center; padding:20px;'>✅ ¡Todo cortado! No hay tareas pendientes.</div>";
        }

        snapshot.forEach((doc) => {
            const m = doc.data();
            const id = doc.id;
            const div = document.createElement('div');
            div.className = `item ${m.estado}`;
            div.innerHTML = `
                <div><strong>${m.nombre}</strong><br><small>${m.medida}</small></div>
                <button class="btn" style="background:${m.estado === 'cortando' ? '#f39c12' : '#2c3e50'}; color:white;" 
                onclick="avanzarEstado('${id}', '${m.estado}')">
                    ${m.estado === 'pendiente' ? 'Iniciar' : 'Terminar ✅'}
                </button>`;
            lista.appendChild(div);
        });
    });
    
    // Función de error mejorada para que el Admin se entere
    function gestionarError(destino) {
        const select = document.getElementById('select-material-error');
        const idOriginal = select.value;
        const nombre = select.options[select.selectedIndex].dataset.nombre;

        db.collection("alertas_errores").add({
            material: nombre,
            destino: destino,
            operario: "Taller 1",
            fecha: new Date().toLocaleString(),
            visto: false
        });

        // Marcamos como terminado para que desaparezca de la lista del operario
        db.collection("materiales").doc(idOriginal).update({ estado: 'cortado' });
        cerrarModal();
        alert("Error notificado al administrador.");
    }
    // ... (Resto de funciones iguales) ...
</script>
