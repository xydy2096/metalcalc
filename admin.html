<script>

    // Nueva función para vigilar los errores en tiempo real
    db.collection("alertas_errores").orderBy("fecha", "desc").limit(5).onSnapshot((snapshot) => {
        const tablaErr = document.getElementById('cuerpo-errores');
        tablaErr.innerHTML = "";
        snapshot.forEach((doc) => {
            const err = doc.data();
            tablaErr.innerHTML += `
                <tr style="background:#fff5f5; color:#c0392b; font-weight:bold;">
                    <td>${err.material}</td>
                    <td>${err.destino}</td>
                    <td>${err.fecha}</td>
                </tr>`;
        });
    });
